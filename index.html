<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF.js Heatmap + Tiled Sphere</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; }
        #overlay { position: absolute; top: 20px; left: 20px; color: #00ff88; text-transform: uppercase; letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="overlay">System Status: <span id="status">Analyzing Mesh...</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>

    <script>
        let scene, camera, renderer, mesh, heatmapTexture, canvas, ctx;
        const CANVAS_SIZE = 1024;

        // Custom Shader to Blend Tiling + Heatmap
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform sampler2D heatmap;
            uniform float time;

            void main() {
                // 1. Create Tiling Grid Pattern
                vec2 tiledUv = vUv * 40.0; // Adjust for density
                vec2 grid = abs(fract(tiledUv - 0.5) - 0.5) / fwidth(tiledUv);
                float line = min(grid.x, grid.y);
                float gridPattern = 1.0 - min(line, 1.0);
                
                // 2. Sample Heatmap Texture
                vec4 heat = texture2D(heatmap, vUv);
                
                // 3. Composite: Dark base + Grid + Heatmap Overlay
                vec3 baseColor = vec3(0.05, 0.05, 0.1);
                vec3 gridColor = vec3(0.1, 0.2, 0.3) * gridPattern;
                
                // Blend heat (Red/Yellow) based on alpha/intensity
                vec3 finalColor = mix(baseColor + gridColor, heat.rgb, heat.a * 0.8);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2.5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Setup Canvas for TF.js to draw on
            canvas = document.createElement('canvas');
            canvas.width = canvas.height = CANVAS_SIZE;
            ctx = canvas.getContext('2d');
            heatmapTexture = new THREE.CanvasTexture(canvas);

            // Apply Shader Material
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    heatmap: { value: heatmapTexture },
                    time: { value: 0 }
                },
                vertexShader,
                fragmentShader
            });

            const geometry = new THREE.SphereGeometry(1, 128, 128);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Initial Canvas Clear
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        }

        async function processWeakPoints() {
            // Using TF.js to generate synthetic "weak point" coordinates
            const points = tf.tidy(() => {
                // Returns 5 random XY coordinates and intensities
                return tf.randomUniform([5, 3], 0, 1); 
            });

            const data = await points.array();
            
            // Fade existing heatmap for "trailing" effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            data.forEach(p => {
                const x = p[0] * CANVAS_SIZE;
                const y = p[1] * CANVAS_SIZE;
                const intensity = p[2] * 50;

                const grad = ctx.createRadialGradient(x, y, 0, x, y, intensity + 20);
                grad.addColorStop(0, 'rgba(255, 0, 0, 1)');
                grad.addColorStop(0.4, 'rgba(255, 150, 0, 0.6)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, intensity + 20, 0, Math.PI * 2);
                ctx.fill();
            });

            heatmapTexture.needsUpdate = true;
            points.dispose();
            document.getElementById('status').innerText = "Analyzing Frame...";
        }

        function animate(t) {
            requestAnimationFrame(animate);
            
            if (mesh) {
                mesh.rotation.y += 0.002;
                mesh.rotation.x += 0.001;
                mesh.material.uniforms.time.value = t * 0.001;
            }

            // Trigger TF.js logic periodically
            if (Math.random() > 0.9) processWeakPoints();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
